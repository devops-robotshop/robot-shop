name: Update Manifest

on:
  workflow_call:

jobs:
  update-manifest:
    name: Update Manifest (GitOps)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Merge image tags
        run: |
          for file in artifacts/**/image.txt; do
            while IFS='=' read -r service tag; do
              echo "Updating $service -> $tag"
              yq -i ".${service}.tag = \"${tag}\"" K8s/helm/images.yaml
            done < "$file"
          done

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add K8s/helm/images.yaml

          if ! git diff --cached --quiet; then
            git commit -m "ci: update image tags [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
