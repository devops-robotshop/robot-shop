name: Verify Deployment

on:
  workflow_call:
    inputs:
      has_changes:
        required: true
        type: boolean
      ref_name:
        required: true
        type: string

jobs:
  verify-deployment:
    name: Verify Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /usr/local/bin/argocd
          key: argocd-v2.13.3

      - name: Install ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.13.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: ArgoCD health check
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          if [ "${{ inputs.ref_name }}" = "master" ]; then
            APP="robot-shop"
          else
            APP="robot-shop-staging"
          fi

          for i in 1 2 3; do
            echo "Attempt $i... checking $APP"
            argocd app wait $APP \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              --insecure --grpc-web --health --timeout 300 && exit 0
            [ $i -lt 3 ] && sleep 20
          done
          exit 1
