name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - id: set-matrix
        run: |
          ALL_APPS=("web" "cart" "catalogue" "dispatch" "payment" "ratings" "shipping" "user")
          CHANGED_APPS=()

          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}

          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-parse HEAD~1)
          fi

          for app in "${ALL_APPS[@]}"; do
            if git diff --name-only $BASE $HEAD | grep -q "^${app}/"; then
              CHANGED_APPS+=("\"${app}\"")
            fi
          done

          if [ ${#CHANGED_APPS[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(printf ",%s" "${CHANGED_APPS[@]}")
            echo "services=[${JSON_ARRAY:1}]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ./gitleaks
          key: gitleaks-8.18.4

      - name: Download Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz

      - name: Gitleaks Secret Scan
        run: ./gitleaks detect --source . --verbose --redact

  build-and-push:
    name: Build & Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Checkov Scan (Block on HIGH/CRITICAL)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./${{ matrix.service }}
          framework: dockerfile
          soft_fail: false

      - name: Auth to GCP
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Docker login
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./${{ matrix.service }}
          args: >
            -Dsonar.organization=devops-robotshop
            -Dsonar.projectKey=devops-robotshop_robot-shop

      - name: SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Report HIGH only
      - name: Trivy HIGH (report)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH

      # Block on CRITICAL
      - name: Trivy CRITICAL (fail)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      # Save build result
      - name: Save image tag
        run: echo "${{ matrix.service }}=${{ github.sha }}" > image.txt

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-${{ matrix.service }}
          path: image.txt

  update-manifest:
    name: Update Manifest (GitOps)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Merge image tags
        run: |
          for file in artifacts/**/image.txt; do
            while IFS='=' read -r service tag; do
              echo "Updating $service -> $tag"
              yq -i ".${service}.tag = \"${tag}\"" K8s/helm/images.yaml
            done < "$file"
          done

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add K8s/helm/images.yaml

          if ! git diff --cached --quiet; then
            git commit -m "ci: update image tags [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

  verify-deployment:
    name: Verify Deploy
    needs: [detect-changes, build-and-push, update-manifest]
    if: always() && needs.detect-changes.outputs.has_changes == 'true' && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/argocd
          key: argocd-v2.13.3

      - name: Install ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.13.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: ArgoCD health check
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            argocd app wait robot-shop \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              --insecure --grpc-web --health --timeout 300 && exit 0

            [ $i -lt 3 ] && sleep 20
          done
          exit 1
