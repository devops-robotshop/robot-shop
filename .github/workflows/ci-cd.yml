name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches:
      - master
      - develop

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop
  IMAGE_NAME: web

permissions:
  contents: write
  id-token: write

jobs:
  build-scan-deploy:
    name: Build → Scan → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Authenticate via Workload Identity Federation (no SA key needed)
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Login to Artifact Registry using access token
      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Build
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./${{ env.IMAGE_NAME }}

      # Security gate — pipeline stops if HIGH/CRITICAL found
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # Push only if Trivy passes
      - name: Push image to Artifact Registry
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "$ACCESS_TOKEN" | docker login \
            -u oauth2accesstoken \
            --password-stdin \
            ${{ env.REGION }}-docker.pkg.dev
          docker push \
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Update image tag in Git — ArgoCD auto-syncs
      - name: Update web image tag in images.yaml
        run: |
          # Install yq — YAML processor (safer than sed for structured files)
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          # Update only web.tag — does not affect other services
          yq e '.web.tag = "${{ github.sha }}"' -i K8s/helm/images.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add K8s/helm/images.yaml

          # Only commit if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "ci: update web image tag to ${{ github.sha }} [skip ci]"
            git push
          fi

          argocd app set robot-shop \
            --helm-set web.image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }} \
            --helm-set web.version=${{ github.sha }}

          argocd app sync robot-shop
          argocd app wait robot-shop --health --timeout 120
