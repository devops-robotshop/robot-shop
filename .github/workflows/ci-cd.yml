name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches:
      - master
      - develop

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop
  IMAGE_NAME: web

permissions:
  contents: write
  id-token: write

jobs:
  build-scan-deploy:
    name: Build → Scan → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Authenticate via Workload Identity Federation (no SA key needed)
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Login to Artifact Registry
      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Setup Docker Buildx (required for build-push-action cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build locally for scanning — not pushed yet
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.IMAGE_NAME }}
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Security gate — pipeline stops if HIGH/CRITICAL found
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # Push only if Trivy passes
      - name: Push image to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.IMAGE_NAME }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update image tag in Git — ArgoCD auto-syncs
      - name: Update web image tag in images.yaml
        run: |
          yq -i '.web.tag = "${{ github.sha }}"' K8s/helm/images.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add K8s/helm/images.yaml

          if ! git diff --cached --quiet; then
            git commit -m "ci: update web image tag to ${{ github.sha }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
