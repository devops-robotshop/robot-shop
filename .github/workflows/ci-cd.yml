name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'web/**'
      - 'cart/**'
      - 'catalogue/**'
      - 'dispatch/**'
      - 'payment/**'
      - 'ratings/**'
      - 'shipping/**'
      - 'user/**'
      - '.github/workflows/ci-cd.yml'

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build-scan-deploy:
    name: Build → Scan → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: [web, cart, catalogue, dispatch, payment, ratings, shipping, user]

    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Update service image tag in images.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use retry logic to handle race conditions when multiple matrix jobs push to Git [cite: 322]
          for i in {1..5}; do
            git pull --rebase origin ${{ github.ref_name }}
            yq -i ".${{ matrix.service }}.tag = \"${{ github.sha }}\"" K8s/helm/images.yaml
            git add K8s/helm/images.yaml
            if git diff --cached --quiet; then
              echo "No changes to commit for ${{ matrix.service }}"
              break
            fi
            if git commit -m "ci: update ${{ matrix.service }} image tag to ${{ github.sha }} [skip ci]" && git push origin ${{ github.ref_name }}; then
              echo "Successfully updated ${{ matrix.service }} tag"
              break
            else
              echo "Conflict detected, retrying... ($i/5)"
              sleep $((RANDOM % 10 + 1))
            fi
          done

      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /usr/local/bin/argocd
          key: argocd-v2.13.3

      - name: Install ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.13.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Wait for ArgoCD sync and health check
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          # Verify deployment health via ArgoCD [cite: 324, 325]
          for i in 1 2 3; do
            argocd app wait robot-shop \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              --insecure \
              --grpc-web \
              --health \
              --timeout 300 && exit 0
            [ $i -lt 3 ] && sleep 15
          done
          exit 1
