name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches: [master, develop]
    # Trigger workflow when any code changes
    paths:
      - 'web/**'
      - 'cart/**'
      - 'catalogue/**'
      - 'dispatch/**'
      - 'payment/**'
      - 'ratings/**'
      - 'shipping/**'
      - 'user/**'
      - 'mongodb/**'
      - 'mysql/**'
      - 'redis/**'
      - 'rabbitmq/**'
      - '.github/workflows/ci-cd.yml'

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop

permissions:
  contents: write
  id-token: write

jobs:
  build-and-push:
    name: Build & Scan Matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web, cart, catalogue, dispatch, payment, ratings, shipping, user, mongodb, mysql, redis, rabbitmq]

    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2 

      - name: Check for changes in ${{ matrix.service }}
        id: check_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^${{ matrix.service }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Detected changes in ${{ matrix.service }}. Starting build..."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in ${{ matrix.service }}. Skipping..."
          fi

      - name: Authenticate to GCP
        if: steps.check_changes.outputs.changed == 'true'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Configure Docker
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy
        if: steps.check_changes.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Update manifest
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in {1..7}; do
            git pull --rebase origin ${{ github.ref_name }}
            yq -i ".${{ matrix.service }}.tag = \"${{ github.sha }}\"" K8s/helm/images.yaml
            git add K8s/helm/images.yaml
            if git commit -m "ci: update ${{ matrix.service }} tag [skip ci]" && git push origin ${{ github.ref_name }}; then
              break
            else
              sleep $((RANDOM % 15 + 5))
            fi
          done

  verify-deployment:
    name: Verify Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /usr/local/bin/argocd
          key: argocd-v2.13.3

      - name: Install ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.13.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: ArgoCD Health Check
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait robot-shop \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure --grpc-web --health --timeout 600
