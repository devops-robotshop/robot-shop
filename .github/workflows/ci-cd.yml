name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/**'

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop

jobs:
  detect-changes:
    name: Scan for Changes
    runs-on: ubuntu-latest
    # Thêm permissions vào đây cho chắc chắn
    permissions:
      contents: read
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set-matrix
        run: |
          ALL_APPS=("web" "cart" "catalogue" "dispatch" "payment" "ratings" "shipping" "user")
          CHANGED_APPS=()
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-parse HEAD~1)
          fi
          for app in "${ALL_APPS[@]}"; do
            if git diff --name-only $BASE $HEAD | grep -q "^${app}/"; then
              CHANGED_APPS+=("\"${app}\"")
            fi
          done
          if [ ${#CHANGED_APPS[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(printf ",%s" "${CHANGED_APPS[@]}")
            echo "services=[${JSON_ARRAY:1}]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build & Scan
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"
      - name: Configure Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Update manifest (GitOps)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in {1..7}; do
            git pull --rebase origin ${{ github.ref_name }}
            yq -i ".${{ matrix.service }}.tag = \"${{ github.sha }}\"" K8s/helm/images.yaml
            git add K8s/helm/images.yaml
            if git commit -m "ci: update ${{ matrix.service }} tag [skip ci]" && git push origin ${{ github.ref_name }}; then
              break
            else
              sleep $((RANDOM % 15 + 5))
            fi
          done

  verify-deployment:
    name: Verify Deploy
    needs: [detect-changes, build-and-push]
    if: always() && needs.detect-changes.outputs.has_changes == 'true' && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Cache ArgoCD CLI
        id: cache-argocd
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/argocd
          key: argocd-v2.13.3
      - name: Install ArgoCD CLI
        if: steps.cache-argocd.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.13.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
      - name: ArgoCD Health Check with Retry
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: Checking health for robot-shop..."
            argocd app wait robot-shop \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              --insecure --grpc-web --health --timeout 300 && exit 0
            [ $i -lt 3 ] && echo "App not healthy, retrying in 20s..." && sleep 20
          done
          exit 1
