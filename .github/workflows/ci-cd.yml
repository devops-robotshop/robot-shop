name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches:
      - master
      - develop

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop
  IMAGE_NAME: web

permissions:
  contents: write
  id-token: write

jobs:
  build-scan-deploy:
    name: Build → Scan → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Authenticate via Workload Identity Federation
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Build
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./${{ env.IMAGE_NAME }}

      # Security gate — pipeline stops if HIGH/CRITICAL found
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # Push only if Trivy passes
      - name: Push image to Artifact Registry
        run: |
          docker push \
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Update Helm values → ArgoCD auto-syncs new tag
      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|g" K8s/helm/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add K8s/helm/values.yaml
          git commit -m "ci: bump web image tag to ${{ github.sha }}"
          git push
