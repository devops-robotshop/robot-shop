name: CI/CD Pipeline - Robot Shop

on:
  push:
    branches:
      - master
      - develop

env:
  PROJECT_ID: project-669c83f6-d64c-4648-b15
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: robot-shop
  IMAGE_NAME: web

permissions:
  contents: write
  id-token: write

jobs:
  build-scan-deploy:
    name: Build → Scan → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Authenticate via Workload Identity Federation (no SA key needed)
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/460877708164/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "robot-shop-gsa@project-669c83f6-d64c-4648-b15.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Login to Artifact Registry using access token
      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Build
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./${{ env.IMAGE_NAME }}

      # Security gate — pipeline stops if HIGH/CRITICAL found
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # Push only if Trivy passes
      - name: Push image to Artifact Registry
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "$ACCESS_TOKEN" | docker login \
            -u oauth2accesstoken \
            --password-stdin \
            ${{ env.REGION }}-docker.pkg.dev
          docker push \
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Update web image via ArgoCD parameter override — does not touch values.yaml
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Deploy web image via ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

          argocd app set robot-shop \
            --helm-set web.image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }} \
            --helm-set web.version=${{ github.sha }}

          argocd app sync robot-shop
          argocd app wait robot-shop --health --timeout 120
