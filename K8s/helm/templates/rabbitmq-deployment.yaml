apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    service: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      service: rabbitmq
  template:
    metadata:
      labels:
        service: rabbitmq
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        ports:
        - containerPort: 5672  
        - containerPort: 15672 

        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi

        readinessProbe:
          httpGet:
            path: /api/health/checks/alarms
            port: 15672
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /api/health/checks/alarms
            port: 15672
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 5

      restartPolicy: Always